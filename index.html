<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weather or Not</title>

<style>
html,body{height:100%;margin:0}
body{
  background:#121212;color:#eee;font-family:Arial,sans-serif;
  display:flex;flex-direction:column;gap:8px;padding:8px;box-sizing:border-box;
}
.card{background:#1e1e1e;border-radius:12px;padding:10px}
input,button{padding:8px;border:none;border-radius:8px;font-size:16px}
a{color:#7db7ff;text-decoration:none;margin-right:12px}
.small{font-size:.9em;color:#bbb}
.main{flex:1;display:flex;flex-direction:column;gap:8px;min-height:0}
.panel{flex:1;display:flex;flex-direction:column;min-height:0}
.panel h3{margin:0 0 8px 0}
.list{overflow-y:auto;min-height:0}

.table-row{
  display:grid;
  grid-template-columns: 55px 70px 40px 70px 1fr;
  align-items:center;
  gap:8px;
  padding:6px 0;
  border-bottom:none;
}

.table-row > :not(:last-child){
  text-align:center;
}

.table-header{
  position: sticky;
  top: 0;
  background:#1e1e1e;
  font-size:12px;
  color:#aaa;
  font-weight:bold;
  z-index:5;
  padding:4px 0;
}

.sky{
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
}

.list > div{
  border-bottom:1px solid #333;
  padding-bottom:6px;
  margin-bottom:6px;
}
</style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1976d2">
<link rel="icon" type="image/png" sizes="48x48" href="icons/app_icon_48.png">

</head>

<body>

<div class="card">
ZIP:
<input id="zip" value="14108">
<button onclick="loadWeather()">Refresh</button>
<div class="small" id="favorites"></div>
</div>

<div id="current" class="card">Loading...</div>

<div class="main">

  <div class="card panel">
    <h3>Next 24 Hours</h3>
    <div class="table-row table-header">
      <div>Time</div>
      <div>Temp</div>
      <div>Sky</div>
      <div>Rain %</div>
      <div>Wind</div>
    </div>
    <div id="hourly" class="list"></div>
  </div>

  <div class="card panel">
    <h3>Next 7 Days</h3>
    <div class="table-row table-header">
      <div>Day</div>
      <div>Hi/Lo</div>
      <div>Sky</div>
      <div>Rain %</div>
      <div>Wind</div>
    </div>
    <div id="daily" class="list"></div>
  </div>

</div>

<script>
function weatherEmoji(text=""){
  text=text.toLowerCase();

  if(text.includes("thunder")) return "⛈️";
  if(text.includes("rain")||text.includes("showers")) return "🌧️";
  if(text.includes("snow")) return "❄️";
  if(text.includes("fog")||text.includes("mist")) return "🌫️";
  if(text.includes("cloud")) return "☁️";
  if(text.includes("sunny")||text.includes("clear")) return "☀️";

  return "🌡️";
}

const zipInput=document.getElementById('zip');

function shortHour(s){
  let d=new Date(s);
  let h=d.getHours();
  let ap=h>=12?'p':'a';
  h=h%12;
  if(h===0) h=12;
  return h+ap;
}

async function loadWeather(){
  try{
    localStorage.setItem('weatherZip',zipInput.value);

    const geo=await fetch(
      `https://nominatim.openstreetmap.org/search?postalcode=${zipInput.value}&country=USA&format=jsonv2&limit=1&addressdetails=1`
    );
    const places=await geo.json();
    if(!places.length) throw new Error('ZIP not found');

    const lat=places[0].lat;
    const lon=places[0].lon;

    const point=await (await fetch(
      `https://api.weather.gov/points/${lat},${lon}`
    )).json();

    // HOURLY (unchanged)
    const hourly=(await (await fetch(
      point.properties.forecastHourly
    )).json()).properties.periods;

    const addr = places[0].address || {};
    const locationName =
      addr.town || addr.city || addr.village || addr.county ||
      places[0].display_name.split(',')[1]?.trim() ||
      places[0].display_name;

    document.getElementById('current').innerHTML=`
      <div style="display:flex; align-items:center; gap:16px;">
        <div style="font-size:48px;">${weatherEmoji(hourly[0].shortForecast)}</div>
        <div style="font-size:32px; font-weight:bold; line-height:1;">${hourly[0].temperature}°F</div>
        <div style="flex:1; line-height:1.3;">
          <div>${locationName}</div>
          <div>${hourly[0].shortForecast} &nbsp;&nbsp; ${hourly[0].windDirection} ${hourly[0].windSpeed}</div>
        </div>
      </div>
    `;

    let h='';
    hourly.slice(0,24).forEach(p=>{
      h+=`
      <div>
        <div class="table-row">
          <div>${shortHour(p.startTime)}</div>
          <div>${p.temperature}°</div>
          <div class="sky">${weatherEmoji(p.shortForecast)}</div>
          <div>${p.probabilityOfPrecipitation?.value||0}%</div>
          <div>${p.windDirection} ${p.windSpeed}</div>
        </div>
        <div class="small" style="padding:2px 0 6px 0; margin-left:8px;">
          ${p.shortForecast}
        </div>
      </div>`;
    });

    document.getElementById('hourly').innerHTML=h;

    // =========================
    // DAILY (NEW GRID SYSTEM)
    // =========================

    const grid = await (await fetch(
      point.properties.forecastGridData
    )).json();

    const maxT = grid.properties.maxTemperature?.values || [];
    const minT = grid.properties.minTemperature?.values || [];
    const pop  = grid.properties.probabilityOfPrecipitation?.values || [];
    const windS = grid.properties.windSpeed?.values || [];
    const windD = grid.properties.windDirection?.values || [];
    const wx = grid.properties.weather?.values || [];

    let days=[];

    for(let i=0;i<7;i++){
      const t = maxT[i];
      if(!t || !t.validTime) continue;

      const date = new Date(t.validTime.split('/')[0]);
      const dayLetter = date.toLocaleString('en-US',{weekday:'narrow'});
      const dayNum = date.getDate();

      days.push({
        name:`${dayLetter} ${dayNum}`,
        high: t.value ?? '-',
        low: minT[i]?.value ?? '-',
        rain: pop[i]?.value ?? 0,
        wind: (windD[i]?.value || '') + ' ' + (windS[i]?.value || ''),
        forecast: wx[i]?.value?.[0]?.shortForecast || ''
      });
    }

    let d='';
    days.forEach(x=>{
      d+=`
      <div>
        <div class="table-row">
          <div>${x.name}</div>
          <div>${x.high}°/${x.low}°</div>
          <div class="sky">${weatherEmoji(x.forecast)}</div>
          <div>${x.rain}%</div>
          <div>${x.wind}</div>
        </div>
        <div class="small" style="padding:2px 0 6px 0; margin-left:8px;">
          ${x.forecast}
        </div>
      </div>`;
    });

    document.getElementById('daily').innerHTML=d;

  }catch(err){
    document.getElementById('current').innerHTML='Error: '+err.message;
  }
}

loadWeather();
</script>

</body>
</html>
